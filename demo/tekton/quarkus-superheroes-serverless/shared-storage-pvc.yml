kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: shared-storage
  namespace: quarkus-superheroes-serverless
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  volumeName: pv0012
  volumeMode: Filesystem
status:
  phase: Bound
  accessModes:
    - ReadWriteOnce
    - ReadWriteMany
    - ReadOnlyMany
  capacity:
    storage: 100Gi
